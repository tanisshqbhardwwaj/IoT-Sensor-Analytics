version: '3.8'

services:

  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL + TimescaleDB extension)
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: iot_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-iotuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iotpassword}
      POSTGRES_DB:       ${DB_NAME:-iotdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iotuser} -d ${DB_NAME:-iotdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Node.js API server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER:     ${DB_USER:-iotuser}
      DB_PASSWORD: ${DB_PASSWORD:-iotpassword}
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-iotdb}
      PORT:        5000
      NODE_ENV:    production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules

  # ---------------------------------------------------------------------------
  # React frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:80"

  # ---------------------------------------------------------------------------
  # Grafana – advanced dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: iot_grafana
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards/iot_dashboard.json:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  # ---------------------------------------------------------------------------
  # pgAdmin – database management UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iot_pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@iot.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ---------------------------------------------------------------------------
  # Redis – optional caching layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: iot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  grafana_data:
  pgadmin_data:
  redis_data:
