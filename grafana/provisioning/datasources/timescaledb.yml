apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    url: db:5432
    database: iotdb
    user: iotuser
    secureJsonData:
      password: iotpassword
    jsonData:
      sslmode: disable
      postgresVersion: 1400
      timescaledb: true
    isDefault: true
    editable: true
